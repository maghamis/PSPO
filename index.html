<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#2f5f46" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="PSPO Coach" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="styles.css" />
  <title>PSPO Study Coach</title>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">Professional Scrum Product Owner™ I</p>
        <h1>PSPO Study Coach</h1>
      </div>
      <button id="installBtn" class="ghost-btn hidden" type="button">Install</button>
    </header>

    <nav class="tabbar" aria-label="Main navigation">
      <button class="tab active" data-route="dashboard">Dashboard</button>
      <button class="tab" data-route="chart">Chart</button>
      <button class="tab" data-route="guide">Guide</button>
      <button class="tab" data-route="learn">Learn</button>
      <button class="tab" data-route="study">Study Later</button>
      <button class="tab" data-route="flashcards">Cards</button>
      <button class="tab" data-route="quiz">Quiz</button>
      <button class="tab" data-route="exam">Exam</button>
      <button class="tab" data-route="review">Review</button>
    </nav>

    <main id="app" class="content" tabindex="-1"></main>
  </div>

  <template id="emptyStateTemplate">
    <section class="card center empty-state">
      <div class="empty-icon">✓</div>
      <h2>Nothing due right now</h2>
      <p>You can reset the deck, start a quiz, or review your missed questions.</p>
    </section>
  </template>

  <script src="data.js"></script>
  <script src="scrum-guide.js"></script>
  <script src="app.js"></script>
</body>
</html>
